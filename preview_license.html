<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview License Card - THRIPTW</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <style>
        :root {
            --bg-color: #0A0A0A;
            --panel-bg: #111111;
            --input-bg: #000000;
            --primary-red: #D91E18;
            --primary-yellow: #f1c40f;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --border-color: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        /* QR MODAL STYLES */
        .qr-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-modal-card {
            background: #000;
            border: 1px solid #111;
            border-radius: 30px;
            width: 480px;
            max-width: 95vw;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        .qr-title {
            font-size: 26px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .btn-close-qr {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #222;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
        }

        .telegram-steps-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 5px;
        }

        .telegram-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #080808;
            border: 1px solid #151515;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }

        .telegram-step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .telegram-step-number {
            background: var(--primary-yellow);
            color: #000;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
        }

        .telegram-step-header h4 {
            font-size: 18px;
            color: white;
            margin: 0;
            font-weight: 700;
        }

        .telegram-qr-wrapper {
            background: #fff;
            padding: 10px;
            border-radius: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            width: 130px;
            height: 130px;
        }

        .qr-image {
            width: 110px;
            height: 110px;
            display: block;
            object-fit: contain;
        }

        .step-handle-text {
            color: #0088cc;
            font-size: 18px;
            font-weight: 700;
            margin: 0;
        }

        .activation-card {
            border: 1px solid #ff0000;
            background: #080808;
        }

        .telegram-input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .telegram-input-group input {
            width: 100%;
            height: 48px;
            padding: 0 20px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
            margin-bottom: 5px;
        }

        .telegram-input-group input:focus {
            border: 2px solid var(--primary-yellow) !important;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.4);
            transform: scale(1.02);
        }

        .telegram-input-group input::placeholder {
            color: #555;
        }

        .btn-redeem {
            width: 100%;
            height: 50px;
            background: #b90000;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-redeem:focus {
            background: #e60000;
            border: 2px solid var(--primary-yellow) !important;
            box-shadow: 0 0 20px rgba(230, 0, 0, 0.5);
            transform: scale(1.02);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="qr-overlay">
        <div class="qr-modal-card">
            <h2 class="qr-title" style="margin-bottom: 5px; font-size: 24px;">Tu prueba de 7 dias ya ha caducado</h2>
            <p class="qr-subtitle" style="font-size: 18px; color: #888; margin-bottom: 20px; font-weight: 600; margin-top: 0;">Compra una licencia 12 meses</p>

            <div class="telegram-steps-container">
                <!-- PASO 1 -->
                <div class="telegram-step">
                    <div class="telegram-step-header">
                        <div class="telegram-step-number">1</div>
                        <h4>Paga 6,95€</h4>
                    </div>
                    <div class="telegram-qr-wrapper">
                        <img src="/QR.png" class="qr-image" alt="PayPal QR">
                    </div>
                    <p class="step-handle-text">Paypal: @thriptw</p>
                </div>

                <!-- PASO 2 -->
                <div class="telegram-step">
                    <div class="telegram-step-header">
                        <div class="telegram-step-number">2</div>
                        <h4>Envia un mensaje</h4>
                    </div>
                    <div class="telegram-qr-wrapper">
                        <img src="/qr telegram.png" class="qr-image" alt="Telegram QR">
                    </div>
                    <p class="step-handle-text">Telegram: @thriptw</p>
                </div>

                <!-- PASO 3 -->
                <div class="telegram-step activation-card">
                    <div class="telegram-step-header">
                        <div class="telegram-step-number">3</div>
                        <h4>Ingresa PIN activación</h4>
                    </div>
                    <div class="telegram-input-group">
                        <input type="text" id="preview-input" placeholder="Escribir PIN" autofocus>
                        <button class="btn-redeem">ACTIVAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        window.onload = () => {
            const input = document.getElementById('preview-input');
            const button = document.querySelector('.btn-redeem');
            input.focus();

            input.onkeydown = (e) => {
                if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    if (input.value.length >= 12) {
                        e.preventDefault();
                        button.focus();
                    }
                }
            };
            button.onkeydown = (e) => {
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    input.focus();
                }
            };
        };
    </script>
</body>
</html>
